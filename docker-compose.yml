services:
  book-backend:
    build: app
    command: sh ./app_entrypoint.dev.sh
    env_file:
      - .env.dev
    restart: unless-stopped
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    depends_on:
      book-db:
        condition: service_healthy
      es:
        condition: service_healthy

  book-db:
    image: postgres:16.2-alpine3.18
    env_file: .env.dev
    restart: unless-stopped
    ports:
      - "5555:5432"
    volumes:
      - book-db-storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Use a dedicated service name to avoid collisions with prod compose.
  # The container is still reachable as "http://elasticsearch:9200" from backend
  # thanks to the network alias.
  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: book_dev_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      default:
        aliases:
          - elasticsearch


volumes:
  book-db-storage:

networks:
  default:
    name: book_network
    external: true
