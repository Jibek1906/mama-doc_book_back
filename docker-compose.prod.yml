services:
  backend:
    build:
      context: app
      dockerfile: Dockerfile.prod
    container_name: book_backend
    env_file:
      - .env.prod
    restart: always
    command: ./app_entrypoint.prod.sh
    expose:
      - "8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      database:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  database:
    image: postgres:16.2-alpine3.18
    container_name: book_postgres
    env_file:
      - .env.prod
    restart: always
    volumes:
      - database-storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: book_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: ../book_front
      dockerfile: Dockerfile.prod
    container_name: book_frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api/v1
      # Server-side (SSR/RSC) fetches need an absolute URL. Inside the compose
      # network, call backend directly to avoid nginx HTTP->HTTPS redirect and
      # certificate mismatch on the internal hostname.
      - API_URL=http://backend:8000/api/v1

  nginx:
    build: nginx
    container_name: book_nginx
    restart: always
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - certbot-www:/var/www/certbot
      - certs:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - default
      - book_network

volumes:
  database-storage:
  static_volume:
  media_volume:
  certbot-www:
  certs:

networks:
  book_network:
    external: true
